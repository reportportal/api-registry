<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>ReportPortal API Specification</title>
  <script src="https://unpkg.com/@stoplight/elements/web-components.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@stoplight/elements/styles.min.css">
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app-header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      border-bottom: 1px solid #d0d7de;
      background: #fff;
    }
    .app-header img { height: 28px; width: 28px; border-radius: 4px; }
    .app-header .title { font-weight: 600; font-size: 14px; }
    .app-header label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #6b7280;
    }
    .app-header select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding: 5px 28px 5px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background-color: #fff;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' fill='none' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M3 4.5L6 7.5L9 4.5'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 12px;
      font-size: 13px;
      color: #1f2937;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .app-header select:hover { border-color: #9ca3af; }
    .app-header select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .app-header option { padding: 6px 10px; }
    .app-header .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      padding: 5px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      color: #1f2937;
      text-decoration: none;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }
    .app-header .repo-link:hover { border-color: #9ca3af; background-color: #f6f8fa; }
    .app-header .repo-link svg { width: 16px; height: 16px; }
    #api-root { flex: 1 1 auto; min-height: 0; }
    #api-root elements-api { height: 100%; display: block; }
  </style>
</head>
<body>
  <header class="app-header">
    <img src="https://avatars.githubusercontent.com/u/17636279?s=200&v=4" alt="ReportPortal">
    <span class="title">ReportPortal API</span>
    <label>Version:
      <select id="version"></select>
    </label>
    <a id="repo-link" class="repo-link" href="#" target="_blank" rel="noopener noreferrer" title="View source on GitHub">
      <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      <span>GitHub</span>
    </a>
  </header>
  <div id="api-root"></div>
  <script src="./web/branches.js"></script>
  <script>
    const SPEC_PATH = 'api/openapi/reportportal-api.yaml';
    const select = document.getElementById('version');
    const root = document.getElementById('api-root');
    const repoLink = document.getElementById('repo-link');

    for (const branch of BRANCHES) {
      const option = document.createElement('option');
      option.value = branch;
      option.textContent = branch;
      select.appendChild(option);
    }

    const params = new URLSearchParams(location.search);
    const initialBranch = BRANCHES.includes(params.get('v')) ? params.get('v') : BRANCHES[0];

    function render(branch) {
      root.innerHTML = '';
      const el = document.createElement('elements-api');
      el.setAttribute(
        'apiDescriptionUrl',
        `https://raw.githubusercontent.com/reportportal/api-registry/${branch}/${SPEC_PATH}`
      );
      el.setAttribute('router', 'hash');
      el.setAttribute('layout', 'sidebar');
      root.appendChild(el);
      repoLink.href = `https://github.com/reportportal/api-registry/tree/${branch}/api/openapi`;
    }

    select.value = initialBranch;
    render(initialBranch);

    select.addEventListener('change', () => {
      const branch = select.value;
      const url = new URL(location.href);
      url.searchParams.set('v', branch);
      history.replaceState(null, '', url);
      render(branch);
    });
  </script>
</body>
</html>
